<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodpanda</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <div class="main">
        <div class="navbar">
            <div class="jrnavbar">
                <div class="foodpanda">
                    <img src="Allimages/foodpandaicon.png" alt="foodpanda icon">
                    <p>foodpanda</p>
                </div>
                <div class="location">
                    <i class="fa-solid fa-location-dot"></i>
                    <p>Location Multan</p>
                </div>
                <div class="log">
                    <button class="login">Log in</button>
                    <button class="signup">Sign Up for free delivery</button>
                </div>
                <div class="global">
                    <i class="fa-solid fa-globe globe"></i>
                    <p>EN</p>
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
                <div class="heart">
                    <i class="fa-regular fa-heart"></i>
                </div>
                <div class="disabled">
                    <i class="fa-solid fa-shop-slash"></i>
                </div>
            </div>

        </div>
        <div class="content">
            <div class="heading-of-panda">
                <h1>Food and groceries delivery from Multan’s best restaurants and shops</h1>
            </div>
            <div class="panda-pic">
                <img src="Allimages/greatpanda.png" alt="panda image">
            </div>
        </div>
        <div class="link">
            <a href="#">Homepage</a>
            <div class="arrow">
                <i class="fa-solid fa-greater-than"></i>
            </div>
            <p>Multan</p>
        </div>
        <div class="mobileapp">
            <div class="scanner">
                <img src="Allimages/scan.png" alt="qr code">
            </div>
            <div class="mobile">
                <h2>Unlock exclusive deals and more in our<br><span class="colored-text"> mobile app</span></h2>
                <div class="paragraph">
                    <p>Meal for one, fast checkout, food & grocery deals: get it all on foodpanda
                    </p>
                </div>
                <div class="buttons">
                    <button class="appstore"><i class="fa-brands fa-apple"></i>App Store</button>
                    <button class="playstore"><i class="fa-brands fa-google-play"></i>Play Store</button>
                </div>
            </div>
            <div class="panda02">
                <img src="Allimages/panda2.png" alt="panda image 2">
            </div>
        </div>
    </div>
</body>

</html>
